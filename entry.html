<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>NASC - ENTRY</title>
    <meta name="description" content="NASCへの申し込み" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ファビコン -->
    <link rel="icon" type="image/png" href="images/favicon.png" />

    <!-- リセットCSS -->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />

    <!-- Googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Philosopher&display=swap"
      rel="stylesheet" />

    <!-- オリジナルCSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="sub-cover cover-news">
      <header class="page-header wrapper">
        <h1 class="align-center">
          <a href="index.html"
            ><img class="logo" src="images/logo.svg" alt="NASC ホーム"
          /></a>
        </h1>
        <nav>
          <ul class="main-nav font-english">
            <li><a href="menu.html">コース一覧</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="entry.html">申込</a></li>
          </ul>
        </nav>
      </header>
      <h2 class="page-title font-english">申込</h2>
    </div>
    <main class="entry-page">
      <h3>申込フォーム</h3>

      <p>
        参加条件や日程についてご不明な点がございましたら、相談内容欄へご記入ください。
      </p>

      <form class="entry-form">
        <label>氏名</label>
        <input type="text" />

        <label>ふりがな</label>
        <input type="text" />

        <label>学年</label>
        <select>
          <option>中学1年</option>
          <option>中学2年</option>
          <option>中学3年</option>
          <option>高校1年</option>
          <option>高校2年</option>
          <option>高校3年</option>
        </select>

        <label>所属チーム</label>
        <input type="text" />

        <label>サッカー歴</label>
        <input type="text" />

        <label>希望コース</label>

        <select>
          <option>3日コース</option>
          <option>10日コース</option>
          <option>15日コース</option>
        </select>
        <label>希望参加月</label>

        <select>
          <option>1月</option>
          <option>2月</option>
          <option>3月</option>
          <option>4月</option>
          <option>5月</option>
          <option>6月</option>
          <option>7月</option>
          <option>8月</option>
          <option>9月</option>
          <option>10月</option>
          <option>11月</option>
          <option>12月</option>
        </select>
        <label>メールアドレス</label>
        <input type="email" />

        <label>電話番号</label>
        <input type="tel" />
        <label>保護者同伴希望</label>

        <select>
          <option>希望しない</option>
          <option>希望する</option>
          <option>検討中</option>
        </select>
        <label>相談内容</label>
        <textarea rows="6"></textarea>

        <button type="submit" class="btn">申込を送信する</button>
      </form>
    </main>

    <footer class="page-footer">
      <h3 class="heading-large font-english">Information</h3>
      <table class="info">
        <tr>
          <th>所在地</th>
          <td>静岡県熱海市東海岸町 ○○○</td>
        </tr>

        <tr>
          <th>アクセス</th>
          <td>JR熱海駅から徒歩約10分・車約3分</td>
        </tr>

        <tr>
          <th>対象</th>
          <td>サッカー経験1年以上の中学生・高校生</td>
        </tr>

        <tr>
          <th>お問い合わせ</th>
          <td>0557-85-XXXX</td>
        </tr>

        <tr>
          <th>受付時間</th>
          <td>8:00〜20:00</td>
        </tr>

        <tr>
          <th>開催日程</th>
          <td>熱海海上花火大会の開催日に合わせて実施（年間15回予定）</td>
        </tr>
      </table>
      <div class="copyright">
        <small>&copy; 2025 Nexus Atami Soccer School</small>
      </div>
    </footer>
  </body>
</html>
